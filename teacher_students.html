<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Teacher Students</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f3f4f6;
padding:20px;
margin:0;
}

.box{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
margin-bottom:10px;
}

.topbar{
display:flex;
gap:15px;
margin:20px 0;
flex-wrap:wrap;
}

select,input{

padding:10px 14px;
border:1px solid #ccc;
border-radius:8px;
font-size:14px;

}

input{

width:250px;

}

table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

th{

background:#0d6efd;
color:white;
padding:14px;

}

td{

padding:14px;
border-bottom:1px solid #ddd;

}

tr:hover{

background:#f7faff;

}

.info{

font-size:18px;
font-weight:bold;
margin-top:10px;

}

</style>

</head>

<body>

<div class="box">

<h1>
👨‍🏫 Teacher Students
</h1>

<div
class="info"
id="sectionText">

Loading...

</div>


<div class="topbar">

<select
id="sectionSelect"
onchange="filterSection()">

<option value="">
All Sections
</option>

</select>


<input
id="search"
placeholder="🔍 Search student..."
oninput="searchStudent()">

</div>


<table>

<thead>

<tr>

<th>#</th>
<th>Name</th>
<th>Email</th>
<th>Section</th>

</tr>

</thead>


<tbody id="tb">

<tr>

<td colspan="4">

Loading students...

</td>

</tr>

</tbody>

</table>

</div>



<script>

const API=
"http://localhost:5002/api";

let allStudents=[];

let currentSection='';

let currentSearch='';



async function load(){

try{

const teacherId=
localStorage.getItem(
"teacherId"
);


if(!teacherId){

location.href=
"login.html";

return;

}


const teacher=
await fetch(
`${API}/teacher/${teacherId}`
)

.then(
r=>r.json()
);



let sections=
teacher.assignedSections || [];


if(
sections.length===0
&&
teacher.section
){

sections=[
teacher.section
];

}



// show section names

document
.getElementById(
"sectionText"
)

.innerHTML=

"Assigned Sections : "
+
sections.join(", ");




// dropdown

const select=
document.getElementById(
"sectionSelect"
);

select.innerHTML=
'<option value="">All Sections</option>';



sections.forEach(sec=>{

select.innerHTML+=

`
<option value="${sec}">
${sec}
</option>
`;

});




// auto select

if(sections.length===1){

select.value=
sections[0];

currentSection=
sections[0];

}




allStudents=
await fetch(
`${API}/students`
)

.then(
r=>r.json()
);


applyFilters();

}
catch(err){

console.log(err);

}

}



function filterSection(){

currentSection=

document
.getElementById(
"sectionSelect"
)
.value;


applyFilters();

}



function searchStudent(){

currentSearch=

document
.getElementById(
"search"
)
.value
.toLowerCase();


applyFilters();

}



function applyFilters(){

let filtered=
allStudents;



if(currentSection){

filtered=

filtered.filter(

s=>

s.section===
currentSection

);

}



if(currentSearch){

filtered=

filtered.filter(

s=>{

const text=

`

${s.fullName}
${s.email}
${s.section}

`

.toLowerCase();


return text.includes(
currentSearch
);

}

);

}


render(filtered);

}




function render(list){

const tb=
document
.getElementById(
"tb"
);


if(
!list.length
){

tb.innerHTML=

`

<tr>

<td colspan="4">

No Students Found

</td>

</tr>

`;

return;

}



tb.innerHTML=

list.map(

(s,i)=>`

<tr>

<td>
${i+1}
</td>

<td>
${s.fullName || 'N/A'}
</td>

<td>
${s.email || '-'}
</td>

<td>
${s.section || '-'}
</td>

</tr>

`

)

.join("");

}



load();

</script>

</body>

</html>
